{%  extends "office/index.html"%}
{% load static %}

{% block title%} Sobre {% endblock%}

{%block body%}
    <body class="d-flex flex-column h-100">
{%endblock%}

{% block conteudo%}
            <!-- Projects Section-->
            <section class="py-5">
                <div class="container px-5 mb-5">
                    <div class="text-center mb-5">
                        <h2 class="display-5 fw-bolder mb-0"><span class="text-dark d-inline">Criadores</span></h2>
                    </div>
                    <div class="row gx-5 justify-content-center">
                        <div class="col-lg-11 col-xl-9 col-xxl-8">
                            <!-- Project Card 1-->
                            {% for x in sobre %}
                            <div class="card overflow-hidden shadow rounded-4 border-0 mb-5">
                                <div class="card-body p-0">
                                    <div class="d-flex align-items-center">
                                        <div class="p-5">
                                            <h2 class="fw-bolder">Nome: {{x.nome}}</h2>
                                            <p>Idade: {{x.idade}}</p>
                                            <p>Curiosidade: {{x.curiosidade}}</p>
                                        </div>
                                        <img class="img-fluid img-criadores" src="{{ x.foto.url }}" alt="..." />
                                    </div>
                                </div>
                            </div>
                            {% endfor %}
                        </div>
                    </div>
                </div>
            </section>
            <!-- Call to action section-->
            <section class="py-2 bg-dark text-white">
                <div class="container px-2 my-2">
                    <div class="text-center">
                        <p class="display-6 fw-bolder mb-4">That's What She Said.</p>
                    </div>
                </div>
            </section>
        </main>
{% endblock %}
